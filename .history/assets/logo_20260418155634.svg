<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80" role="img" aria-labelledby="title desc">
  <title id="title">Copperfin Logo</title>
  <desc id="desc">Stylized copper fish with circuit traces and Copperfin wordmark.</desc>

  <defs>
    <!-- Copper gradient -->
    <linearGradient id="copperGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b86b2b"/>
      <stop offset="50%" stop-color="#d98b3a"/>
      <stop offset="100%" stop-color="#f2b068"/>
    </linearGradient>

    <!-- Silver gradient -->
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d7d7d7"/>
      <stop offset="50%" stop-color="#f2f2f2"/>
      <stop offset="100%" stop-color="#b0b0b0"/>
    </linearGradient>
  </defs>

  <!-- Fish + fin body -->
  <g transform="translate(10,10)">
    <!-- Main body -->
    <path d="M10 30
             C10 18, 22 10, 36 10
             C50 10, 62 18, 62 30
             C62 42, 50 50, 36 50
             C22 50, 10 42, 10 30 Z" fill="url(#copperGradient)"/>

    <!-- Tail fin -->
    <path d="M62 20 L80 30 L62 40 Z" fill="url(#copperGradient)"/>

    <!-- Dorsal fin -->
    <path d="M26 12 L36 2 L46 12 Z" fill="url(#copperGradient)"/>

    <!-- Eye -->
    <circle cx="24" cy="28" r="2.2" fill="#3a1f0c"/>

    <!-- Circuit traces from head -->
    <g stroke="#f7c98a" stroke-width="2.2" fill="none" stroke-linecap="round">
      <line x1="14" y1="24" x2="0" y2="16"/>
      <line x1="14" y1="30" x2="0" y2="30"/>
      <line x1="14" y1="36" x2="0" y2="44"/>
      <circle cx="0" cy="16" r="3" fill="#f7c98a" stroke="none"/>
      <circle cx="0" cy="30" r="3" fill="#f7c98a" stroke="none"/>
      <circle cx="0" cy="44" r="3" fill="#f7c98a" stroke="none"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g font-family="Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="600" dominant-baseline="middle" transform="translate(110,40)">
    <!-- "Copper" -->
    <text x="0" y="0" fill="url(#copperGradient)">Copper</text>
    <!-- "fin" -->
    <text x="132" y="0" fill="url(#silverGradient)">fin</text>
  </g>
</svg>
