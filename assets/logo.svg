<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" role="img" aria-labelledby="title desc">
  <title id="title">Copperfin Studio Logo</title>
  <desc id="desc">An original logo featuring a shield-like data mark in copper and teal beside the word Copperfin Studio.</desc>
  <defs>
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D9853B"/>
      <stop offset="100%" stop-color="#B65620"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3A8F89"/>
      <stop offset="100%" stop-color="#245E5B"/>
    </linearGradient>
  </defs>

  <rect width="640" height="220" fill="#F8FAFC"/>

  <g transform="translate(34 30)">
    <path d="M76 0 136 22 136 85C136 126 108 154 76 166 44 154 16 126 16 85V22Z" fill="url(#teal)"/>
    <path d="M76 16 120 32 120 82C120 112 101 135 76 146 51 135 32 112 32 82V32Z" fill="#11202A" opacity=".18"/>

    <g fill="url(#copper)">
      <rect x="42" y="40" width="24" height="24" rx="4"/>
      <rect x="72" y="40" width="24" height="24" rx="4"/>
      <rect x="42" y="70" width="24" height="24" rx="4"/>
      <rect x="72" y="70" width="24" height="24" rx="4"/>
    </g>

    <path d="M34 112C49 101 63 97 76 97s27 4 42 15" fill="none" stroke="#E7D9C8" stroke-width="8" stroke-linecap="round"/>
    <path d="M52 127C60 122 68 119 76 119s16 3 24 8" fill="none" stroke="#E7D9C8" stroke-width="6" stroke-linecap="round" opacity=".95"/>
  </g>

  <g transform="translate(210 58)" fill="#1F2937">
    <text x="0" y="50" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="1">COPPERFIN</text>
    <text x="2" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="5" fill="#2D7D7A">STUDIO</text>
    <text x="2" y="124" font-family="Consolas, 'Courier New', monospace" font-size="14" fill="#6B7280">legacy data / modern backbone</text>
  </g>
</svg>
