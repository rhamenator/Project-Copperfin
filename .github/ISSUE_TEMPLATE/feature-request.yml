name: Feature Request
description: Suggest a new capability or improvement.
title: "[feature] <short summary>"
labels:
  - enhancement
  - feedback
  - triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What would you like to see?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you considered.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - runtime/parity
        - data engine
        - build/debug pipeline
        - documentation
        - IDE/editor integration
        - security/policy
        - portability
        - other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Requested Priority
      options:
        - nice to have
        - useful
        - important
        - critical
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How should we know this request is complete?
    validations:
      required: true
