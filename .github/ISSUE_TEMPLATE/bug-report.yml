name: Bug Report
description: Report a reproducible defect in behavior.
title: "[bug] <short summary>"
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for deterministic reproduction.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: One clear sentence describing the defect.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Provide exact steps, input files, and commands.
      placeholder: |
        1. Open ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: build_info
    attributes:
      label: Build / Commit / Version
      placeholder: commit hash, tag, or build artifact version
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - none
        - low
        - medium
        - high
    validations:
      required: true

  - type: dropdown
    id: regression
    attributes:
      label: Regression
      options:
        - unknown
        - yes
        - no
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, runtime mode, relevant dependencies.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots / Artifacts
      description: Paste stack traces and attach reproduction files if possible.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other clues that could help triage.
    validations:
      required: false
